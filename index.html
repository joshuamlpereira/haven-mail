<!DOCTYPE html>
<!--
  Haven Mail — suspect's mailbox
  UToledo Cybersecurity Summer Camp / Packet Sniffer Detective CTF

  Students reach this URL by solving the terminal challenge (the URL is the flag),
  then sign in with the credentials they sniffed out of the packet capture. Those
  creds belong to the suspect, so signing in drops them into the suspect's mailbox.

  Each of the six team logins decrypts to a DIFFERENT set of coordinates (a real
  US landmark), and those coordinates are buried in an ordinary-looking email in a
  cluttered inbox, so students have to actually read the mail to find them.

  Login is checked in-browser against SHA-256 hashes (no plaintext passwords in
  source); it's gate-theater, not real auth.

  Bonus flag for the curious who View-Source:  FLAG{UT_CYBER_2026_CASE_CLOSED}
-->

<meta charset="UTF-8" />

<style>
  :root {
    --bg:#eef1f4; --surface:#ffffff; --raised:#f7f8fa;
    --ink:#1b2430; --dim:#6b7280; --faint:#9aa4b2;
    --line:#e4e8ee; --brand:#0f766e; --brand-dk:#0b5c55; --brand-tint:#e6f3f1;
    --danger:#dc2626; --unread:#0f172a;
    --sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body { font-family:var(--sans); color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased; }

  /* ============ LOGIN ============ */
  #login {
    min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px;
    background:linear-gradient(160deg,#0f766e 0%,#0b5c55 40%,#0a3d38 100%);
  }
  .card {
    width:100%; max-width:400px; background:var(--surface); border-radius:14px;
    box-shadow:0 24px 60px rgba(3,30,27,.35); padding:40px 36px 30px;
  }
  .logo { display:flex; align-items:center; gap:9px; font-weight:700; font-size:20px; color:var(--brand); margin-bottom:26px; }
  .logo svg { width:26px; height:26px; }
  .card h1 { font-size:22px; font-weight:600; letter-spacing:-.2px; }
  .card .lede { color:var(--dim); font-size:14px; margin:4px 0 24px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:13px; font-weight:500; color:var(--ink); margin-bottom:6px; }
  .field input {
    width:100%; padding:11px 13px; font-family:inherit; font-size:15px; color:var(--ink);
    background:var(--surface); border:1px solid #cdd5df; border-radius:8px; outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .field input:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(15,118,110,.15); }
  .signin {
    width:100%; margin-top:8px; padding:12px; font-family:inherit; font-size:15px; font-weight:600;
    color:#fff; background:var(--brand); border:none; border-radius:8px; cursor:pointer;
    transition:background .15s;
  }
  .signin:hover { background:var(--brand-dk); }
  .signin:focus-visible { outline:3px solid rgba(15,118,110,.4); outline-offset:2px; }
  .forgot { display:inline-block; margin-top:16px; font-size:13px; color:var(--brand); text-decoration:none; }
  .forgot:hover { text-decoration:underline; }
  #msg { min-height:18px; margin-top:14px; font-size:13px; color:var(--danger); }
  .card .foot { margin-top:26px; padding-top:16px; border-top:1px solid var(--line); font-size:12px; color:var(--faint); text-align:center; }
  .shake { animation:shake .38s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }

  /* ============ APP ============ */
  #app { display:none; height:100dvh; flex-direction:column; background:var(--surface); }
  .topbar {
    display:flex; align-items:center; gap:12px; padding:0 18px; height:58px;
    border-bottom:1px solid var(--line); flex:0 0 auto; background:var(--surface);
  }
  .topbar .logo { margin:0; font-size:18px; }
  .topbar .spacer { flex:1; }
  .search {
    flex:1; max-width:420px; height:38px; padding:0 14px; border:1px solid var(--line);

    font-family:inherit; outline:none;

  .avatar { width:34px; height:34px; border-radius:50%; background:var(--brand); color:#fff;

  .acct { font-size:13px; color:var(--dim); }

  .main { flex:1; display:grid; grid-template-columns:210px 1fr; min-height:0; }
  .folders { border-right:1px solid var(--line); padding:14px 10px; background:var(--surface); overflow:auto; }

  .storage .track { height:5px; background:var(--line); border-radius:3px; margin-top:7px; overflow:hidden; }
  .storage .fill { height:100%; width:78%; background:var(--brand); }

  .pane { min-height:0; overflow:auto; background:var(--surface); }

  /* message list */
  .listhead { padding:16px 22px 10px; font-size:15px; font-weight:600; color:var(--ink); border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--surface); }
  .msg-row { display:grid; grid-template-columns:22px 190px 1fr auto; align-items:center; gap:12px;
             padding:13px 22px; border-bottom:1px solid var(--line); cursor:pointer; }
  .msg-row:hover { background:var(--raised); }
  .msg-row .dot { width:8px; height:8px; border-radius:50%; background:transparent; }
  .msg-row.unread .dot { background:var(--brand); }
  .msg-row .from { font-size:14px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .msg-row.unread .from { font-weight:700; }
  .msg-row .snip { font-size:14px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .msg-row .snip b { color:var(--ink); font-weight:600; }
  .msg-row.unread .snip b { font-weight:700; }
  .msg-row .date { font-size:12px; color:var(--faint); white-space:nowrap; }

  /* single message */
  .reader { padding:20px 26px 60px; max-width:760px; }
  .back { display:inline-flex; align-items:center; gap:7px; margin-bottom:18px; padding:7px 12px;
          border:1px solid var(--line); background:var(--surface); border-radius:8px; cursor:pointer;
          font-family:inherit; font-size:13px; color:var(--ink); }
  .back:hover { background:var(--raised); }
  .reader h2 { font-size:21px; font-weight:600; letter-spacing:-.2px; margin-bottom:16px; }
  .msg-meta { display:flex; align-items:center; gap:12px; padding-bottom:16px; border-bottom:1px solid var(--line); margin-bottom:20px; }
  .msg-meta .who { font-size:14px; }
  .msg-meta .who b { display:block; font-weight:600; }
  .msg-meta .who span { color:var(--dim); font-size:13px; }
  .msg-meta .when { margin-left:auto; font-size:13px; color:var(--faint); }
  .msg-body { font-size:15px; line-height:1.75; color:#26313f; white-space:pre-wrap; }
  .msg-body .sig { color:var(--dim); }

  .empty { padding:60px 22px; text-align:center; color:var(--faint); font-size:14px; }

  @media (max-width:640px) {
    .main { grid-template-columns:1fr; }
    .folders { display:flex; gap:6px; overflow-x:auto; padding:10px; border-right:none; border-bottom:1px solid var(--line); }
    .folders button { width:auto; white-space:nowrap; }
    .storage { display:none; }
    .msg-row { grid-template-columns:16px 1fr auto; }
    .msg-row .snip { display:none; }
    .acct { display:none; }
    .search { display:none; }
  }
  @media (prefers-reduced-motion:reduce) { .shake { animation:none; } }

async function sha256(t){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("");}
const $ = id => document.getElementById(id);

/* ===== login ===== */
async function attempt(){
  const user=$("u").value.trim().toLowerCase(), pass=$("p").value, msg=$("msg");
  if(!user||!pass){ msg.textContent="Enter your username and password."; return; }
  msg.textContent="";
  const hash=await sha256(pass);
  if(CREDS[user] && CREDS[user]===hash){ openMailbox(user); }
  else{
    msg.textContent="Wrong username or password. Try again.";
    $("card").classList.remove("shake"); void $("card").offsetWidth; $("card").classList.add("shake");
    $("p").select();
  }
}
$("go").addEventListener("click", attempt);
$("p").addEventListener("keydown", e=>{ if(e.key==="Enter") attempt(); });
$("u").addEventListener("keydown", e=>{ if(e.key==="Enter") $("p").focus(); });

/* build a big descending list of plausible date labels */
function makeDates(n){
  const times=["3:42 PM","1:15 PM","11:52 AM","10:07 AM","8:33 AM"];
  const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const months=["Apr","Mar","Feb","Jan","Dec"];
  const out=[];
  for(let i=0;i<n;i++){
    if(i<3) out.push(times[i]);
    else if(i<6) out.push("Yesterday");
    else if(i<22) out.push(days[i%7]);
    else { const m=months[Math.floor((i-22)/28)%months.length]; const day=28-((i-22)%28); out.push(m+" "+day); }
  }
  return out;
}

let ACCOUNT = "";
let MAIL = [];   // built fresh per login so the coordinates match the team

/* Build the suspect's mailbox for one team.
   ~115 filler emails clutter the inbox. The plot emails are spliced into fixed
   positions; the coordinates live in Uncle Ray's "Re: saturday" (id 5), buried
   deep at index 71. The only trail is V.'s note pointing at "ray's emails",
   and there are TWO Ray emails, so students must read to find the right one. */
function buildMail(loc){
  const P = plotEmails(loc);
  const dates = makeDates(140);
  const inbox = [];
  for(let i=0;i<118;i++){
    const d = DECOYS[(i*17 + 5) % DECOYS.length];
    inbox.push({ ...d, id:1000+i, folder:"inbox", unread:(i%29===7), date:dates[i] });
  }
  // splice the plot emails into place (replaces the filler at that slot)
  inbox[0]  = P.security;   // top
  inbox[4]  = P.vspot;      // the pointer, near the top
  inbox[11] = P.mom;
  inbox[33] = P.raydecoy;   // first Ray email (family noise)
  inbox[71] = P.raykey;     // coordinates, buried deep

  const other = [
    { id:20, folder:"drafts", unread:false, from:"Draft", addr:"(no recipient)",
      date:"Tue", subject:"(no subject)", snippet:"we have the kids. they are fine. leave the",
      body:`we have the kids. they are fine.\n\nleave the money in the blue duffel by the loading dock. no cops.\n\nwe will contact you again with the` },
    { id:21, folder:"sent", unread:false, from:"Me", addr:"to: Uncle Ray",
      date:"Fri", subject:"Re: saturday", snippet:"got it, i'll be there for 9. coming alone",
      body:`got it. i'll be there for 9, coming alone like you said.\n\nstop worrying, i've got this handled.` },
    { id:22, folder:"sent", unread:false, from:"Me", addr:"to: V.",
      date:"Yesterday", subject:"Re: the spot", snippet:"fine, i deleted it. you worry too much",
      body:`fine, i deleted it. you worry too much.\n\nnobody reads my email anyway.` },
    { id:23, folder:"spam", unread:false, from:"REWARDS CENTER", addr:"winner@prize-claim-now.info",
      date:"Wed", subject:"\u2b50 You've been selected for a $500 gift card!!!", snippet:"CONGRATULATIONS! Claim before it expires",
      body:`CONGRATULATIONS!!!\n\nYou have been RANDOMLY SELECTED to receive a $500 gift card. Click below to CLAIM before it expires!\n\n[ CLAIM NOW ]` },
    { id:24, folder:"spam", unread:false, from:"Delivery Notice", addr:"parcel@delivery-redirect.info",
      date:"Wed", subject:"Your package could not be delivered", snippet:"Reschedule by confirming your details",
      body:`We attempted to deliver your package but were unable to.\n\nTo reschedule, confirm your address and a small redelivery fee below.\n\n[ CONFIRM DETAILS ]` }
  ];

  return inbox.concat(other);
}

const FOLDERS = [
  { id:"inbox",  label:"Inbox"  },
  { id:"drafts", label:"Drafts" },
  { id:"sent",   label:"Sent"   },
  { id:"spam",   label:"Spam"   },
  { id:"trash",  label:"Trash"  }
];
let current = "inbox";

function openMailbox(user){
  ACCOUNT = user + "@haven.mail";
  MAIL = buildMail(LOCATIONS[user] || LOCATIONS.group1);
  $("login").style.display = "none";
  $("app").style.display = "flex";
  $("acct").textContent = ACCOUNT;
  $("av").textContent = user.charAt(0).toUpperCase() + (user.match(/\d/)||[""])[0];
  renderFolders();
  renderList("inbox");
}

function unreadCount(folder){ return MAIL.filter(m=>m.folder===folder && m.unread).length; }

function renderFolders(){
  const nav = $("folders"); nav.innerHTML = "";
  FOLDERS.forEach(f=>{
    const n = unreadCount(f.id);
    const b = document.createElement("button");
    b.className = (f.id===current ? "active" : "");
    b.innerHTML = `<span>${f.label}</span>${n?`<span class="cnt">${n}</span>`:""}`;
    b.addEventListener("click", ()=>{ current=f.id; renderFolders(); renderList(f.id); });
    nav.appendChild(b);
  });
  const s = document.createElement("div");
  s.className="storage";
  s.innerHTML = `6.2 GB of 8 GB used<div class="track"><div class="fill"></div></div>`;
  nav.appendChild(s);
}

function renderList(folder){
  current = folder;
  const pane = $("pane");
  const q = ($("q") ? $("q").value : "").trim().toLowerCase();
  let items = MAIL.filter(m=>m.folder===folder);
  if(q){
    // search sender / subject / preview only — NOT the body, so the buried
    // coordinates can't be surfaced by searching for digits.
    items = items.filter(m =>
      (m.from+" "+m.subject+" "+m.snippet).toLowerCase().includes(q));
  }
  const label = FOLDERS.find(f=>f.id===folder).label;
  let html = `<div class="listhead">${label}${q?` &mdash; ${items.length} result${items.length===1?"":"s"} for "${escapeHtml(q)}"`:""}</div>`;
  if(!items.length){ html += `<div class="empty">No messages found.</div>`; }
  items.forEach(m=>{
    html += `<div class="msg-row ${m.unread?'unread':''}" data-id="${m.id}">
      <span class="dot"></span>
      <span class="from">${m.from}</span>
      <span class="snip"><b>${m.subject}</b> — ${m.snippet}</span>
      <span class="date">${m.date}</span>
    </div>`;
  });
  pane.innerHTML = html;
  pane.scrollTop = 0;
  pane.querySelectorAll(".msg-row").forEach(row=>{
    row.addEventListener("click", ()=>openMessage(+row.dataset.id));
  });
}

function openMessage(id){
  const m = MAIL.find(x=>x.id===id);
  if(m.unread){ m.unread=false; renderFolders(); }
  const pane = $("pane");
  pane.innerHTML = `
    <div class="reader">
      <button class="back" id="back">&larr; Back to ${FOLDERS.find(f=>f.id===m.folder).label}</button>
      <h2>${m.subject}</h2>
      <div class="msg-meta">
        <span class="avatar">${m.from.charAt(0).toUpperCase()}</span>
        <span class="who"><b>${m.from}</b><span>${m.addr}</span></span>
        <span class="when">${m.date}</span>
      </div>
      <div class="msg-body">${escapeHtml(m.body)}</div>
    </div>`;
  pane.scrollTop = 0;
  $("back").addEventListener("click", ()=>renderList(m.folder));
}

function escapeHtml(s){ return s.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
